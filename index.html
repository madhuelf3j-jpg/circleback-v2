<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CircleBack V2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:white;
color:black;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:64px;
margin-bottom:10px;
}

.hero p{
font-size:24px;
}

.card{
border:2px solid black;
border-radius:12px;
padding:25px;
margin-top:25px;
}

h2{
margin-bottom:20px;
}

select,
textarea,
input{
width:100%;
padding:12px;
border:2px solid black;
border-radius:8px;
margin-top:10px;
margin-bottom:15px;
font-size:16px;
}

textarea{
resize:vertical;
min-height:150px;
}

button{
background:black;
color:white;
border:none;
padding:14px 24px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.stat{
border:2px solid black;
border-radius:10px;
padding:20px;
text-align:center;
}

.big{
font-size:42px;
font-weight:bold;
}

.question-box{
background:#f7f7f7;
padding:20px;
border-radius:10px;
border:2px solid black;
margin-bottom:20px;
}

.feedback-item{
padding:15px 0;
border-bottom:1px solid #ccc;
}

.feedback-item:last-child{
border-bottom:none;
}

@media(max-width:768px){

.hero h1{
font-size:42px;
}

.hero p{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>CIRCLEBACK</h1>
<p>Reflect • Improve • Succeed</p>
</div>

<div class="card">

<h2>Subject Selection</h2>

<select id="subject" onchange="loadQuestion()">
<option>AS Biology</option>
<option>AS Chemistry</option>
<option>AS Physics</option>
<option>AS Business</option>
<option>Computer Science</option>
<option>Mathematics</option>
</select>

<div class="question-box">
<h3>Question</h3>
<p id="questionText">
Select a subject to load a question.
</p>
</div>

<textarea
id="response"
placeholder="Write your answer here..."
></textarea>

<button onclick="submitResponse()">
Submit Answer
</button>

</div>

<div class="card">

<h2>Statistics Dashboard</h2>

<div class="stats">

<div class="stat">
<div class="big" id="users">0</div>
Unique Users
</div>

<div class="stat">
<div class="big" id="attempts">0</div>
Total Attempts
</div>

<div class="stat">
<div class="big" id="physicsCount">0</div>
Physics Attempts
</div>

<div class="stat">
<div class="big" id="chemCount">0</div>
Chemistry Attempts
</div>

</div>

</div>

<div class="card">

<h2>Recent Responses</h2>

<div id="history">
No responses yet.
</div>

</div>

</div>

<script>

const questions = {

"AS Biology":
"Explain how enzymes work and why temperature affects enzyme activity.",

"AS Chemistry":
"Describe and explain the trend in atomic radius across Period 3.",

"AS Physics":
"Explain the difference between scalar and vector quantities with examples.",

"AS Business":
"Discuss one advantage and one disadvantage of market research.",

"Computer Science":
"Explain the purpose of a compiler and an interpreter.",

"Mathematics":
"Differentiate x² + 5x + 6."

};

let attempts =
Number(localStorage.getItem("cb_attempts")) || 0;

let physicsCount =
Number(localStorage.getItem("physicsCount")) || 0;

let chemCount =
Number(localStorage.getItem("chemCount")) || 0;

let entries =
JSON.parse(localStorage.getItem("cb_entries")) || [];

document.getElementById("attempts").innerText =
attempts;

document.getElementById("physicsCount").innerText =
physicsCount;

document.getElementById("chemCount").innerText =
chemCount;

document.getElementById("users").innerText =
1;

function loadQuestion(){

const subject =
document.getElementById("subject").value;

document.getElementById("questionText").innerText =
questions[subject];

}

function submitResponse(){

const subject =
document.getElementById("subject").value;

const response =
document.getElementById("response").value;

if(response.trim()===""){

alert("Please write an answer.");

return;

}

attempts++;

if(subject==="AS Physics"){
physicsCount++;
}

if(subject==="AS Chemistry"){
chemCount++;
}

entries.unshift({
subject,
response,
time:new Date().toLocaleString()
});

localStorage.setItem(
"cb_attempts",
attempts
);

localStorage.setItem(
"physicsCount",
physicsCount
);

localStorage.setItem(
"chemCount",
chemCount
);

localStorage.setItem(
"cb_entries",
JSON.stringify(entries)
);

document.getElementById("attempts").innerText =
attempts;

document.getElementById("physicsCount").innerText =
physicsCount;

document.getElementById("chemCount").innerText =
chemCount;

document.getElementById("response").value = "";

render();

alert(
"Answer submitted. Feedback system coming next."
);

}

function render(){

let html = "";

entries.slice(0,10).forEach(item=>{

html += `
<div class="feedback-item">
<b>${item.subject}</b><br>
${item.response}<br>
<small>${item.time}</small>
</div>
`;

});

document.getElementById("history").innerHTML =
html || "No responses yet.";

}

loadQuestion();
render();

</script>

</body>
</html>
